# Example nginx server for www.elabs.com proxying to Waitress.
# Obtain TLS certs (e.g. certbot) and include ssl_certificate paths as needed.
#
# Waitress:
#   WAITRESS_HOST=127.0.0.1 WAITRESS_PORT=8080 TRUST_PROXY=1 WAITRESS_URL_SCHEME=https

upstream waitress_elabs {
	server 127.0.0.1:8080;
	keepalive 32;
}

server {
	listen 443 ssl http2;
	server_name www.elabs.com;

	# ssl_certificate     /etc/letsencrypt/live/www.elabs.com/fullchain.pem;
	# ssl_certificate_key /etc/letsencrypt/live/www.elabs.com/privkey.pem;

	client_max_body_size 25m;

	location / {
		proxy_pass         http://waitress_elabs;
		proxy_http_version 1.1;
		proxy_set_header   Host              $host;
		proxy_set_header   X-Real-IP         $remote_addr;
		proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
		proxy_set_header   X-Forwarded-Proto $scheme;
		proxy_set_header   Connection        "";
	}
}

server {
	listen 80;
	server_name www.elabs.com;
	return 301 https://$host$request_uri;
}

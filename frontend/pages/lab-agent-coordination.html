<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE MACHINE — Agent Coordination Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════
//  AGENT COORDINATION LAB — Multi-Agent Orchestration
//  Hero: Central round table with holographic network
// ═══════════════════════════════════════════════════

const cv=document.getElementById('c'),X=cv.getContext('2d');
let W,H,T=0;
function resize(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cv.width=W*d;cv.height=H*d;cv.style.width=W+'px';cv.style.height=H+'px';X.setTransform(d,0,0,d,0,0)}
addEventListener('resize',resize);resize();
const COS30=Math.cos(Math.PI/6),SIN30=.5;let SC,OX,OY;
function iso(x,y,z){return[OX+(x-y)*COS30*SC,OY+(x+y)*SIN30*SC-z*SC]}
const RW=140,RD=140,RH=95;
const C={floorDark:'#0c1218',floorLight:'#121a24',wallBack:'#0a1018',wallLeft:'#080e14',trim:'#1a2a3e',trimDim:'#10182a',metal:'#0e1620',metalLt:'#1a2838',metalHi:'#2a3a50',cyan:'#00ccff',cyanBright:'#44eeff',cyanDim:'#006688',green:'#22ff66',greenDim:'#118833',amber:'#ffaa22',purple:'#aa66ff',purpleDim:'#553388',pink:'#ff44aa',yellow:'#ffdd44',red:'#ff4444',orange:'#ff8844',screenBg:'#020810',screenBdr:'#0a5580'};
const RAINBOW=[C.cyan,C.green,C.amber,C.purple,C.pink,C.yellow,C.orange,'#44ddaa','#6688ff',C.red];

function poly(pts,fill,stroke,lw){X.beginPath();const[sx,sy]=iso(...pts[0]);X.moveTo(sx,sy);for(let i=1;i<pts.length;i++){const[px,py]=iso(...pts[i]);X.lineTo(px,py)}X.closePath();if(fill){X.fillStyle=fill;X.fill()}if(stroke){X.strokeStyle=stroke;X.lineWidth=lw||1;X.stroke()}}
function box(x,y,z,w,d,h,cT,cL,cR,str){poly([[x,y,z+h],[x+w,y,z+h],[x+w,y+d,z+h],[x,y+d,z+h]],cT,str,.5);poly([[x,y+d,z],[x,y+d,z+h],[x+w,y+d,z+h],[x+w,y+d,z]],cL,str,.5);poly([[x+w,y,z],[x+w,y,z+h],[x+w,y+d,z+h],[x+w,y+d,z]],cR,str,.5)}
function glow(wx,wy,wz,r,color,a){const[cx,cy]=iso(wx,wy,wz);const rad=r*SC;const g=X.createRadialGradient(cx,cy,0,cx,cy,rad);g.addColorStop(0,color+(a||'22'));g.addColorStop(1,'transparent');X.fillStyle=g;X.fillRect(cx-rad,cy-rad,rad*2,rad*2)}

function drawFloor(){const ts=10;for(let gx=0;gx<RW;gx+=ts)for(let gy=0;gy<RD;gy+=ts){const ch=((gx/ts+gy/ts)%2===0);poly([[gx,gy,0],[gx+ts,gy,0],[gx+ts,gy+ts,0],[gx,gy+ts,0]],ch?C.floorLight:C.floorDark,'#0e182844',.3)}}
function drawWalls(){poly([[0,0,0],[RW,0,0],[RW,0,RH],[0,0,RH]],C.wallBack);poly([[0,0,0],[0,RD,0],[0,RD,RH],[0,0,RH]],C.wallLeft);for(let wx=8;wx<RW;wx+=12){const[x1,y1]=iso(wx,.2,2),[x2,y2]=iso(wx,.2,RH-2);X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.strokeStyle=C.trim+'18';X.lineWidth=.4;X.stroke()}for(let wz=10;wz<RH;wz+=15){const[x1,y1]=iso(2,.2,wz),[x2,y2]=iso(RW-2,.2,wz);X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.strokeStyle=C.trim+'12';X.lineWidth=.3;X.stroke()}for(let wy=8;wy<RD;wy+=14){const[x1,y1]=iso(.2,wy,2),[x2,y2]=iso(.2,wy,RH-2);X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.strokeStyle=C.trim+'14';X.lineWidth=.3;X.stroke()}const[c1x,c1y]=iso(0,0,RH),[c2x,c2y]=iso(RW,0,RH),[c3x,c3y]=iso(0,RD,RH);X.beginPath();X.moveTo(c3x,c3y);X.lineTo(c1x,c1y);X.lineTo(c2x,c2y);X.strokeStyle=C.trim+'60';X.lineWidth=1.5;X.stroke()}

function wallScreen(face,pos,dim,content){const{x,z}=pos,{w,h}=dim;let pts;if(face==='back')pts=[[x,.8,z],[x+w,.8,z],[x+w,.8,z+h],[x,.8,z+h]];else pts=[[.8,x,z],[.8,x+w,z],[.8,x+w,z+h],[.8,x,z+h]];poly(pts,C.screenBg,C.screenBdr+'55',.8);for(let sl=1;sl<h;sl+=1.5){let p1,p2;if(face==='back'){p1=iso(x+.5,.6,z+sl);p2=iso(x+w-.5,.6,z+sl)}else{p1=iso(.6,x+.5,z+sl);p2=iso(.6,x+w-.5,z+sl)}X.beginPath();X.moveTo(p1[0],p1[1]);X.lineTo(p2[0],p2[1]);X.strokeStyle=C.pink+'06';X.lineWidth=.4;X.stroke()}
if(content==='bars'){const numBars=Math.floor(w/2.5),barW=(w-3)/numBars;for(let b=0;b<numBars;b++){const val=Math.sin(T*.002+b*.6)*.3+.65,bh=val*(h-4),bx=x+1.5+b*barW,bz=z+2,col=RAINBOW[b%RAINBOW.length];let p;if(face==='back')p=[[bx,.5,bz],[bx+barW*.75,.5,bz],[bx+barW*.75,.5,bz+bh],[bx,.5,bz+bh]];else p=[[.5,bx,bz],[.5,bx+barW*.75,bz],[.5,bx+barW*.75,bz+bh],[.5,bx,bz+bh]];poly(p,col+'99')}}
else if(content==='line'){[C.pink,C.cyan,C.purple].forEach((col,ci)=>{X.beginPath();for(let p=0;p<20;p++){const px=x+1.5+(w-3)*(p/19),val=Math.sin(T*.003*(ci+1)+p*.5+ci*2)*.3+.5,pz=z+2+val*(h-4),pt=face==='back'?iso(px,.4,pz):iso(.4,px,pz);p===0?X.moveTo(pt[0],pt[1]):X.lineTo(pt[0],pt[1])}X.strokeStyle=col+'cc';X.lineWidth=1.2;X.shadowColor=col;X.shadowBlur=6;X.stroke();X.shadowBlur=0})}
else if(content==='map'){const nodes=[];for(let i=0;i<12;i++)nodes.push({nx:x+2+Math.random()*(w-4),nz:z+2+Math.random()*(h-4)});X.globalAlpha=.4;for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++)if(Math.random()<.3){const p1=face==='back'?iso(nodes[i].nx,.4,nodes[i].nz):iso(.4,nodes[i].nx,nodes[i].nz),p2=face==='back'?iso(nodes[j].nx,.4,nodes[j].nz):iso(.4,nodes[j].nx,nodes[j].nz);X.beginPath();X.moveTo(p1[0],p1[1]);X.lineTo(p2[0],p2[1]);X.strokeStyle=C.pink+'55';X.lineWidth=.5;X.stroke()}X.globalAlpha=1;nodes.forEach((n,i)=>{const pt=face==='back'?iso(n.nx,.3,n.nz):iso(.3,n.nx,n.nz);X.beginPath();X.arc(pt[0],pt[1],2*SC,0,Math.PI*2);X.fillStyle=RAINBOW[i%RAINBOW.length];X.shadowColor=RAINBOW[i%RAINBOW.length];X.shadowBlur=4;X.fill();X.shadowBlur=0})}
else if(content==='code'){for(let r=0;r<Math.floor(h/2.5);r++){const rz=z+1.5+r*2.5,rw=(Math.sin(T*.001+r*1.1)*.25+.55)*(w-3),col=r%3===0?C.pink:r%3===1?C.cyan:C.purple;let p1,p2;if(face==='back'){p1=iso(x+1.5,.4,rz);p2=iso(x+1.5+rw,.4,rz)}else{p1=iso(.4,x+1.5,rz);p2=iso(.4,x+1.5+rw,rz)}X.beginPath();X.moveTo(p1[0],p1[1]);X.lineTo(p2[0],p2[1]);X.strokeStyle=col+'55';X.lineWidth=1.5;X.stroke()}}
pts.forEach(p=>{const[px,py]=iso(...p);X.beginPath();X.arc(px,py,1.5,0,Math.PI*2);X.fillStyle=C.screenBdr+'88';X.fill()})}

function serverRack(rx,ry,rw,rd,rh){box(rx,ry,0,rw,rd,rh,C.metalLt,C.metal,C.metal+'dd',C.trim+'33');const unitH=rh/7;for(let u=0;u<7;u++){const uz=1+u*unitH;poly([[rx+rw,ry,uz+.5],[rx+rw,ry+rd,uz+.5],[rx+rw,ry+rd,uz+unitH-.5],[rx+rw,ry,uz+unitH-.5]],'#060c14',C.trim+'22',.3);for(let l=0;l<4;l++){const ly=ry+2+l*(rd-4)/3,[lx,lly]=iso(rx+rw+.3,ly,uz+unitH/2),phase=Math.sin(T*.005+u*.9+l*1.4),lc=phase>.2?C.pink:phase>-.3?C.cyan:C.purple;X.beginPath();X.arc(lx,lly,1*SC,0,Math.PI*2);X.fillStyle=lc;X.shadowColor=lc;X.shadowBlur=4;X.fill();X.shadowBlur=0}}}
function desk(dx,dy,dw,dd){const dh=16;box(dx,dy,0,dw,dd,dh,C.metalLt+'cc',C.metal,C.metal+'bb',C.trim+'22');box(dx+1,dy+1,0,1.5,1.5,dh-1,C.metal,C.metal,C.metal);box(dx+dw-2.5,dy+1,0,1.5,1.5,dh-1,C.metal,C.metal,C.metal);const mw=dw*.7,mh=14,md=2,mx=dx+(dw-mw)/2,my=dy+2;box(mx+mw/2-1.5,my+dd*.3,dh,3,3,4,C.metal,C.metal,C.metal);box(mx,my+1,dh+4,mw,md,mh,C.metal,C.screenBg,'#011520',C.screenBdr+'44');for(let b=0;b<5;b++){const bh=(Math.sin(T*.003+b*1.1+dx)*.25+.6)*mh*.6,bx=mx+1.5+b*(mw-3)/5,col=RAINBOW[b%RAINBOW.length];poly([[bx,my+md+1,dh+5],[bx+2,my+md+1,dh+5],[bx+2,my+md+1,dh+5+bh],[bx,my+md+1,dh+5+bh]],col+'88')}}
function chair(cx,cy){box(cx,cy,0,6,6,2,C.metal,C.metal,C.metal);box(cx+2.5,cy+2.5,2,1.5,1.5,10,C.metal,C.metal,C.metal);box(cx-1,cy-1,12,8,8,2,C.metalLt,'#0c1520','#0c1520');box(cx,cy-1,14,1.5,8,10,C.metalLt+'88','#0a1018','#0a1018')}
function smallBox(sx,sy,sw,sd,sh,col){box(sx,sy,0,sw,sd,sh,col+'aa',col+'77',col+'88',C.trim+'22')}
function crate(sx,sy){smallBox(sx,sy,8,8,6,C.metal);const[tx,ty]=iso(sx+4,sy+4,6.5);X.beginPath();X.arc(tx,ty,2*SC,0,Math.PI*2);X.fillStyle=C.trimDim;X.fill()}

// ─── HERO: Round Table with Holographic Network ──────────
function drawCoordinationTable(bx, by) {
  const tableR = 22;
  const tableZ = 12;
  const float = Math.sin(T*.002)*2;

  // Table base (cylinder approximation with polygon)
  const sides = 12;
  // Pedestal column
  box(bx-5, by-5, 0, 10, 10, tableZ-2, C.metal, C.metal, C.metal+'cc', C.trim+'33');
  // Table top (polygon)
  const topPts = [];
  for(let i=0; i<sides; i++){
    const a = i*Math.PI*2/sides;
    topPts.push([bx+Math.cos(a)*tableR, by+Math.sin(a)*tableR, tableZ]);
  }
  poly(topPts, C.metalLt+'dd', C.trim+'55', .8);

  // Table rim glow
  const [tcx, tcy] = iso(bx, by, tableZ);
  X.beginPath();X.ellipse(tcx, tcy, tableR*COS30*SC, tableR*SIN30*SC, 0, 0, Math.PI*2);
  X.strokeStyle = C.pink+'33'; X.lineWidth = 1.5; X.stroke();

  // Agent seats (6 agent positions around the table)
  const agentColors = [C.cyan, C.green, C.pink, C.amber, C.purple, C.orange];
  const agentNames = ['CEO','DEV','QA','OPS','DOC','SEC'];
  for(let a = 0; a < 6; a++){
    const angle = a*Math.PI/3 + Math.PI/6;
    const seatX = bx + Math.cos(angle)*(tableR+14);
    const seatY = by + Math.sin(angle)*(tableR+14);
    // Chair
    chair(seatX-3, seatY-3);
    // Agent status orb above seat
    const [ox, oy] = iso(seatX, seatY, 28);
    const pulse = Math.sin(T*.004+a*1.5)*.3+.7;
    X.globalAlpha = pulse;
    X.beginPath();X.arc(ox,oy,4*SC,0,Math.PI*2);
    const orbG = X.createRadialGradient(ox,oy,0,ox,oy,4*SC);
    orbG.addColorStop(0, agentColors[a]);
    orbG.addColorStop(1, agentColors[a]+'33');
    X.fillStyle = orbG;X.shadowColor=agentColors[a];X.shadowBlur=8;X.fill();X.shadowBlur=0;
    X.globalAlpha = 1;

    // Connection line from agent to center hologram
    const [cx2,cy2]=iso(bx,by,35+float);
    X.beginPath();X.moveTo(ox,oy);X.lineTo(cx2,cy2);
    const lineAlpha = Math.sin(T*.003+a*2)*.3+.4;
    X.strokeStyle=agentColors[a]+Math.floor(lineAlpha*255).toString(16).padStart(2,'0');
    X.lineWidth=1;X.stroke();
  }

  // Central holographic network (brain/mesh above table)
  const netZ = 35 + float;
  const [ncx, ncy] = iso(bx, by, netZ);

  // Glow
  const netGlow = X.createRadialGradient(ncx,ncy,0,ncx,ncy,30*SC);
  netGlow.addColorStop(0, C.pink+'22');
  netGlow.addColorStop(1, 'transparent');
  X.fillStyle = netGlow;
  X.fillRect(ncx-60*SC, ncy-60*SC, 120*SC, 120*SC);

  // Network mesh nodes
  const netNodes = [];
  for(let n = 0; n < 15; n++){
    const na = T*.002 + n*1.3;
    const nr = 12 + Math.sin(n*2.5)*6;
    const nx = bx + Math.cos(na)*nr;
    const ny = by + Math.sin(na)*nr;
    const nz = netZ + Math.sin(T*.003+n)*8;
    netNodes.push({x:nx,y:ny,z:nz,c:RAINBOW[n%RAINBOW.length]});
  }
  // Connections
  for(let i=0;i<netNodes.length;i++)for(let j=i+1;j<netNodes.length;j++){
    if((i+j)%3===0){
      const [p1x,p1y]=iso(netNodes[i].x,netNodes[i].y,netNodes[i].z);
      const [p2x,p2y]=iso(netNodes[j].x,netNodes[j].y,netNodes[j].z);
      X.beginPath();X.moveTo(p1x,p1y);X.lineTo(p2x,p2y);
      X.strokeStyle=C.pink+'22';X.lineWidth=.5;X.stroke();
    }
  }
  // Nodes
  netNodes.forEach(n=>{
    const [px,py]=iso(n.x,n.y,n.z);
    const pulse = Math.sin(T*.005+n.x)*.3+.7;
    X.globalAlpha=pulse;
    X.beginPath();X.arc(px,py,2.5*SC,0,Math.PI*2);
    X.fillStyle=n.c;X.shadowColor=n.c;X.shadowBlur=5;X.fill();X.shadowBlur=0;
    X.globalAlpha=1;
  });

  // Central core (bright dot)
  X.beginPath();X.arc(ncx,ncy,4*SC,0,Math.PI*2);
  const coreG=X.createRadialGradient(ncx,ncy,0,ncx,ncy,4*SC);
  coreG.addColorStop(0,'#ffffff');
  coreG.addColorStop(.5,C.pink);
  coreG.addColorStop(1,C.pink+'44');
  X.fillStyle=coreG;X.shadowColor=C.pink;X.shadowBlur=12;X.fill();X.shadowBlur=0;

  // Data pulse rings
  for(let r=0;r<3;r++){
    const ringR = ((T*.002+r*2)%6)*5;
    const[rx2,ry2]=iso(bx,by,netZ);
    X.globalAlpha=Math.max(0, .4-ringR/30);
    X.beginPath();X.ellipse(rx2,ry2,ringR*COS30*SC,ringR*SIN30*SC,0,0,Math.PI*2);
    X.strokeStyle=C.pink;X.lineWidth=1;X.stroke();
    X.globalAlpha=1;
  }
}

function drawCeilingLights(){[{x:30,y:25},{x:80,y:30},{x:30,y:80},{x:80,y:80}].forEach(l=>{const[top]=[iso(l.x,l.y,RH)],[bot]=[iso(l.x,l.y,0)];const cg=X.createLinearGradient(top[0],top[1],bot[0],bot[1]);cg.addColorStop(0,C.purpleDim+'10');cg.addColorStop(.6,C.purpleDim+'03');cg.addColorStop(1,'transparent');X.save();X.globalAlpha=.3+Math.sin(T*.0015+l.x)*.08;const sp=18,[tl]=[iso(l.x-3,l.y,RH)],[tr]=[iso(l.x+3,l.y,RH)],[bl]=[iso(l.x-sp,l.y,0)],[br]=[iso(l.x+sp,l.y,0)];X.beginPath();X.moveTo(tl[0],tl[1]);X.lineTo(bl[0],bl[1]);X.lineTo(br[0],br[1]);X.lineTo(tr[0],tr[1]);X.closePath();X.fillStyle=cg;X.fill();X.restore()})}

let particles=[];
function initP(){particles=[];for(let i=0;i<60;i++)particles.push({x:5+Math.random()*(RW-10),y:5+Math.random()*(RD-10),z:5+Math.random()*(RH-10),vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.12,vz:(Math.random()-.5)*.08,size:.8+Math.random()*1.8,color:RAINBOW[Math.floor(Math.random()*RAINBOW.length)],phase:Math.random()*Math.PI*2})}initP();
function drawParticles(){particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;if(p.x<3||p.x>RW-3)p.vx*=-1;if(p.y<3||p.y>RD-3)p.vy*=-1;if(p.z<3||p.z>RH-3)p.vz*=-1;const a=Math.sin(T*.003+p.phase)*.3+.5,[sx,sy]=iso(p.x,p.y,p.z);X.globalAlpha=a;X.beginPath();X.arc(sx,sy,p.size*SC,0,Math.PI*2);X.fillStyle=p.color;X.shadowColor=p.color;X.shadowBlur=3;X.fill();X.shadowBlur=0;X.globalAlpha=1})}

function hexPath(r){const cx=W/2,cy=H/2;X.beginPath();for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3,px=cx+r*Math.cos(a),py=cy+r*Math.sin(a);i===0?X.moveTo(px,py):X.lineTo(px,py)}X.closePath()}
function drawHexBorder(r){const cx=W/2,cy=H/2;X.save();hexPath(r);X.shadowColor=C.pink;X.shadowBlur=40+Math.sin(T*.002)*12;X.strokeStyle=C.pink+'55';X.lineWidth=3;X.stroke();X.restore();hexPath(r);X.strokeStyle='#0e1a2a';X.lineWidth=10;X.stroke();hexPath(r);X.strokeStyle='#381838';X.lineWidth=4;X.stroke();hexPath(r);X.strokeStyle=C.pink+'33';X.lineWidth=2;X.stroke();for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3,px=cx+r*Math.cos(a),py=cy+r*Math.sin(a);X.beginPath();X.arc(px,py,6,0,Math.PI*2);X.fillStyle='#1e2848';X.fill();X.beginPath();X.arc(px,py,3,0,Math.PI*2);X.fillStyle='#0e1228';X.fill();X.beginPath();X.arc(px,py,1.5,0,Math.PI*2);X.fillStyle=C.pink+'44';X.fill()}
function rrect(x,y,w,h,r){X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.arcTo(x+w,y,x+w,y+r,r);X.lineTo(x+w,y+h-r);X.arcTo(x+w,y+h,x+w-r,y+h,r);X.lineTo(x+r,y+h);X.arcTo(x,y+h,x,y+h-r,r);X.lineTo(x,y+r);X.arcTo(x,y,x+r,y,r);X.closePath()}
const pw=260,ph=30,plateX=cx-pw/2,plateY=cy-r-24;X.fillStyle='#0a1220';X.strokeStyle='#381838';X.lineWidth=2;rrect(plateX,plateY,pw,ph,5);X.fill();X.stroke();X.fillStyle=C.pink+'33';X.fillRect(plateX+15,plateY+ph-2,pw-30,1);X.font='700 13px system-ui';X.fillStyle='#d8a8c8';X.textAlign='center';X.textBaseline='middle';X.fillText('AGENT COORDINATION LAB',cx,plateY+ph/2);X.textAlign='left'}

function render(){
  T=performance.now();SC=Math.min(W,H)*.0026;OX=W/2+5;OY=H/2+45;
  X.clearRect(0,0,W,H);
  const bg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);bg.addColorStop(0,'#0c0810');bg.addColorStop(1,'#040408');X.fillStyle=bg;X.fillRect(0,0,W,H);
  X.save();const r=Math.min(W,H)*.46;hexPath(r);X.clip();
  drawCeilingLights();drawWalls();
  wallScreen('back',{x:3,z:55},{w:30,h:30},'map');
  wallScreen('back',{x:37,z:48},{w:55,h:38},'bars');
  wallScreen('back',{x:96,z:55},{w:36,h:30},'map');
  wallScreen('back',{x:5,z:20},{w:28,h:28},'line');
  wallScreen('back',{x:38,z:18},{w:26,h:25},'code');
  wallScreen('back',{x:70,z:20},{w:26,h:26},'bars');
  wallScreen('back',{x:100,z:22},{w:32,h:28},'map');
  wallScreen('left',{x:5,z:50},{w:28,h:32},'map');
  wallScreen('left',{x:38,z:50},{w:30,h:30},'line');
  wallScreen('left',{x:72,z:52},{w:30,h:28},'bars');
  wallScreen('left',{x:8,z:18},{w:24,h:26},'code');
  wallScreen('left',{x:38,z:16},{w:28,h:28},'map');
  wallScreen('left',{x:72,z:20},{w:30,h:25},'line');
  drawFloor();
  serverRack(3,5,12,14,50);serverRack(3,23,12,14,45);
